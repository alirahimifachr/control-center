<a [routerLink]="['/flashcard/deck', deckId, 'browse']" class="btn btn-link px-0 mb-2">
  <i class="bi bi-arrow-left me-1"></i>Back to cards
</a>

<div class="d-flex justify-content-between">
  <h4 class="mb-4">{{ cardId ? 'Edit Card' : 'New Card' }}</h4>
  <button
    type="button"
    class="btn btn-sm btn-outline-secondary mb-3"
    (click)="showPreview.set(!showPreview())"
  >
    {{ showPreview() ? 'Hide' : 'Show' }} Preview
  </button>
</div>

@if (error()) {
  <div class="alert alert-danger">{{ error() }}</div>
}

@if (card.isLoading()) {
  <div class="text-center py-3">
    <span class="spinner-border"></span>
  </div>
} @else {
  <form (submit)="onSubmit($event)" novalidate>
    @if (showPreview()) {
      <div class="card mb-3">
        <div class="card-body">
          <strong>Front:</strong>
          <div [innerHTML]="cardModel().front | markdown"></div>
          <hr />
          <strong>Back:</strong>
          <div [innerHTML]="cardModel().back | markdown"></div>
        </div>
      </div>
    } @else {
      <div class="mb-3">
        <label for="front" class="form-label">Front</label>
        <textarea
          id="front"
          class="form-control"
          rows="1"
          [formField]="cardForm.front"
          [class.is-invalid]="cardForm.front().touched() && cardForm.front().invalid()"
        ></textarea>
      </div>

      <div class="mb-3">
        <label for="back" class="form-label">Back</label>
        <textarea
          id="back"
          class="form-control"
          rows="15"
          [formField]="cardForm.back"
          [class.is-invalid]="cardForm.back().touched() && cardForm.back().invalid()"
        ></textarea>
      </div>
    }

    <div class="mb-3 d-flex align-items-end gap-3">
      <label for="box" class="form-label">Box ({{ MIN_BOX }}–{{ MAX_BOX }})</label>
      <input
        type="number"
        id="box"
        [formField]="cardForm.box"
        class="form-control shadow-sm w-auto"
        [class.is-invalid]="cardForm.box().touched() && cardForm.box().invalid()"
      />
    </div>

    <div class="d-flex justify-content-end gap-2 mb-3">
      <a [routerLink]="['/flashcard/deck', deckId, 'browse']" class="btn btn-outline-secondary"
        >Cancel</a
      >
      @if (cardId) {
        <button type="submit" class="btn btn-primary">Update</button>
      } @else {
        <button type="submit" (click)="next.set(true)" class="btn btn-outline-primary">
          Create & Next
        </button>
        <button type="submit" class="btn btn-primary">Create</button>
      }
    </div>
  </form>
}
